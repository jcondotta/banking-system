name: recipients
services:
  postgres:
    image: postgres:17-alpine
    container_name: recipients-postgres-17
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: recipients_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d recipients_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking_network
    volumes:
      - recipients_postgres_volume:/var/lib/postgresql/data

volumes:
  recipients_postgres_volume:
    name: recipients-postgres-data

networks:
  banking_network:
    external: true
    name: banking_network