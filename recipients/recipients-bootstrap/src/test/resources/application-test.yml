app:
  environment: test

spring:
  output:
    ansi:
      enabled: always

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

management:
  tracing:
    export:
      enabled: false
      otlp:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4317
          transport: grpc
