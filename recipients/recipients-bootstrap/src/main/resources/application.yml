server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: recipients
    version: "@project.version@"

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 3
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  mvc:
    apiversion:
      supported:
        - "1.0"
      use:
        header: X-API-Version

app:
  concurrency:
    recipients:
      create:
        limit: 5
      remove:
        limit: 5
  api:
    recipients:
      root-path: '/api/bank-accounts/{bank-account-id}/recipients'
      recipient-id-path: '/api/bank-accounts/{bank-account-id}/recipients/{recipient-id}'

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus

  observations:
    annotations:
      enabled: true
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
        step: 10s

  metrics:
    tags:
      application: ${spring.application.name}

    enable:
      recipients.remove.active: false
      recipients.create.active: false
      recipients.list.active: false
      recipients.list.result.size.percentile: false

    distribution:
      percentiles-histogram:
        http.server.requests: true
        recipients.create: true
        recipients.remove: true
        recipients.list: true

      percentiles:
        http.server.requests: 0.5, 0.9, 0.99
        recipients.create: 0.5, 0.9, 0.99
        recipients.remove: 0.5, 0.9, 0.99
        recipients.list: 0.5, 0.9, 0.99
