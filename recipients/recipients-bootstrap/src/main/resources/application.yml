server:
  port: ${SERVER_PORT:8096}

spring:
  application:
    name: recipients
    version: "@project.version@"

  datasource:
    url: ${SPRING_DATASOURCE_URL}?connectTimeout=3&socketTimeout=30
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 3
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  mvc:
    apiversion:
#      default: "1.0"
      supported:
        - "1.0"
      use:
        header: X-API-Version

app:
  concurrency:
    recipients:
      create:
        limit: 5
      remove:
        limit: 5
  api:
    recipients:
      root-path: '/api/bank-accounts/{bank-account-id}/recipients'
      recipient-id-path: '/api/bank-accounts/{bank-account-id}/recipients/{recipient-id}'

management:
  endpoints:
    web:
      exposure:
        include: health #, metrics

  observations:
