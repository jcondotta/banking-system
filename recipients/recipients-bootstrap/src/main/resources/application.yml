server:
  port: ${SERVER_PORT:8096}

spring:
  application:
    name: recipients
    version: "@project.version@"

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  mvc:
    apiversion:
      default: "1.0"
      supported:
        - "1.0"
      use:
        header: X-API-Version

app:
  api:
    recipients:
      root-path: '/api/bank-accounts/{bank-account-id}/recipients'
      recipient-id-path: '/api/bank-accounts/{bank-account-id}/recipients/{recipient-id}'

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        step: 10s

  observations:
    annotations:
      enabled: true

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:4317}
          transport: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_TRANSPORT:grpc}

  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    export:
      enabled: ${MANAGEMENT_TRACING_EXPORT_ENABLED:true}
      otlp:
        enabled: ${MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

  metrics:
    tags:
      application: ${spring.application.name}

    enable:
      recipient.remove.active: false
      recipient.create.active: false
      recipient.list.active: false
      recipient.list.result.size.percentile: false

    distribution:
      percentiles-histogram:
        http.server.requests: true
        recipient.create: true
        recipient.remove: true
        recipient.list: true

      percentiles:
        http.server.requests: 0.5, 0.9, 0.99
        recipient.create: 0.5, 0.9, 0.99
        recipient.remove: 0.5, 0.9, 0.99
        recipient.list: 0.5, 0.9, 0.99
