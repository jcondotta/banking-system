name: banking

services:
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3100:3100"   # Loki
    volumes:
      - lgtm_data:/data
    networks:
      - banking_network

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: banking-kafka-1
    hostname: kafka-1
    networks:
      - banking_network
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@kafka-1:9093

      KAFKA_LISTENERS: >
        PLAINTEXT://kafka-1:29092,
        PLAINTEXT_HOST://0.0.0.0:9092,
        CONTROLLER://kafka-1:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka-1:29092,
        PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_1_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: banking-kafka-init
    restart: no
    depends_on:
      - kafka-1
    networks:
      - banking_network
    volumes:
      - ./kafka/01-create-topics.sh:/usr/local/bin/01-create-topics.sh
    entrypoint: [ "/bin/bash", "/usr/local/bin/01-create-topics.sh" ]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: banking-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: >
        kafka-1:29092
    networks:
      - banking_network

volumes:
  lgtm_data:
    name: banking-lgtm-data
  kafka_1_data:
    name: banking-kafka-1-data

networks:
  banking_network:
    name: banking_network
