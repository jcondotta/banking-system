spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  otlp:
    metrics:
      export:
        enabled: true
        url: http://localhost:4318/v1/metrics
        step: 10s

app:
  kafka:
    topics:
      bank-account-opened:
        topic-name: bank-account-opened
      bank-account-status-changed:
        topic-name: bank-account-status-changed
      joint-account-holder-added:
        topic-name: joint-account-holder-added

cloud:
  aws:
    region:
      static: ${AWS_DEFAULT_REGION:us-east-1}
    credentials:
      access-key-id: ${AWS_ACCESS_KEY_ID:test}
      secret-key: ${AWS_SECRET_ACCESS_KEY:test}
    dynamodb:
      endpoint: ${AWS_DYNAMODB_ENDPOINT:http://127.0.0.1:4566}
      tables:
        bank-accounts:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME:bank-accounts}

        outbox:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME:bank-accounts}
          indexes:
            gsi1:
              name: ${AWS_DYNAMODB_OUTBOX_GSI1_NAME:gsi-outbox-status}
