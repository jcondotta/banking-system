server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: accounts-outbox-service
    version: "@project.version@"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.write-dates-as-timestamps: false

cloud:
  aws:
    region:
      static: ${AWS_DEFAULT_REGION:us-east-1}
    credentials:
      access-key-id: ${AWS_ACCESS_KEY_ID:test}
      secret-key: ${AWS_SECRET_ACCESS_KEY:test}
    dynamodb:
      endpoint: ${AWS_DYNAMODB_ENDPOINT:http://127.0.0.1:4566}
      tables:
        outbox:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME:bank-accounts}
          indexes:
            gsi1:
              name: ${AWS_DYNAMODB_OUTBOX_GSI1_NAME:gsi-outbox-status}

app:
  outbox:
    shards:
      count: 4
      batch-size-per-shard: 40
      concurrency-per-shard: 4
    processing:
      acquire-timeout: 10s
      publish-timeout: 5s
      max-retries: 5
      lease:
        duration: 30s
    polling:
      interval: 10s
  kafka:
    topics:
      bank-account-opened:
        topic-name: ${KAFKA_BANK_ACCOUNT_OPENED_TOPIC_NAME}
      bank-account-status-changed:
        topic-name: ${KAFKA_BANK_ACCOUNT_STATUS_CHANGED_TOPIC_NAME}
      joint-account-holder-added:
        topic-name: ${KAFKA_JOINT_ACCOUNT_HOLDER_ADDED_TOPIC_NAME}

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus

  observations:
    annotations:
      enabled: true

  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
        step: 10s

  metrics:
    tags:
      application: ${spring.application.name}

    enable:
      accounts.outbox.dispatch.active: false
      accounts.outbox.process.active: false
      accounts.outbox.publish.active: false

    distribution:
      percentiles-histogram:
        http.server.requests: true
        accounts.outbox.dispatch: true
        accounts.outbox.process: true
        accounts.outbox.publish: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.99
        accounts.outbox.dispatch: 0.5, 0.9, 0.99
        accounts.outbox.process: 0.5, 0.9, 0.99
        accounts.outbox.publish: 0.5, 0.9, 0.99
