server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: accounts-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.write-dates-as-timestamps: false

app:
  outbox:
    shards:
      count: 4

cloud:
  aws:
    region:
      static: ${AWS_DEFAULT_REGION:us-east-1}
    dynamodb:
      endpoint: ${AWS_DYNAMODB_ENDPOINT:http://127.0.0.1:4566}
      tables:
        bank-accounts:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME}

        outbox:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME}

api:
  v1:
    bank-accounts:
      root-path: '/api/v1/bank-accounts'
      bank-account-id-path: '/api/v1/bank-accounts/{bank-account-id}'
      account-holders-path: '/api/v1/bank-accounts/{bank-account-id}/account-holders'

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        bankAccounts.open: true
        bankAccounts.activate: true
        bankAccounts.block: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        bankAccounts.open: 0.5, 0.95, 0.99
        bankAccounts.activate: 0.5, 0.95, 0.99
        bankAccounts.block: 0.5, 0.95, 0.99
#      expiry:
#        outbox.publish.duration: 5m
#        outbox.shard.wait.duration: 5m
#      buffer-length:
#        outbox.publish.duration: 3
#        outbox.shard.wait.duration: 3