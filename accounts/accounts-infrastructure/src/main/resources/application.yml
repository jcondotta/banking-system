server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: bank-accounts-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.write-dates-as-timestamps: false

cloud:
  aws:
    region:
      static: ${AWS_DEFAULT_REGION}
    dynamodb:
      tables:
        bank-accounts:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME}

        outbox:
          table-name: ${AWS_DYNAMODB_BANK_ACCOUNTS_TABLE_NAME}
          indexes:
            gsi1:
              name: ${AWS_DYNAMODB_OUTBOX_GSI1_NAME}

app:
  outbox:
    shards:
      count: 4
      concurrency-per-shard: 2
      batch-size-per-shard: 50
    processing:
      timeout: 10s
    polling:
      interval: 2s
  kafka:
    topics:
      bank-account-opened:
        topic-name: ${KAFKA_BANK_ACCOUNT_OPENED_TOPIC_NAME}
      bank-account-activated:
        topic-name: ${KAFKA_BANK_ACCOUNT_ACTIVATED_TOPIC_NAME}
      bank-account-blocked:
        topic-name: ${KAFKA_BANK_ACCOUNT_BLOCKED_TOPIC_NAME}
      bank-account-unblocked:
        topic-name: ${KAFKA_BANK_ACCOUNT_UNBLOCKED_TOPIC_NAME}
      bank-account-closed:
        topic-name: ${KAFKA_BANK_ACCOUNT_CLOSED_TOPIC_NAME}
      joint-account-holder-added:
        topic-name: ${KAFKA_JOINT_ACCOUNT_HOLDER_ADDED_TOPIC_NAME}

api:
  v1:
    bank-accounts:
      root-path: '/api/v1/bank-accounts'
      bank-account-id-path: '/api/v1/bank-accounts/{bank-account-id}'
      account-holders-path: '/api/v1/bank-accounts/{bank-account-id}/account-holders'

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        bankAccounts.open: true
        bankAccounts.activate: true
        bankAccounts.block: true
#        cache.get: true
#        cache.put_if_absent: true
#        cache.put: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        bankAccounts.open: 0.5, 0.95, 0.99
        bankAccounts.activate: 0.5, 0.95, 0.99
        bankAccounts.block: 0.5, 0.95, 0.99
#        cache.get: 0.5, 0.95, 0.99
#        cache.put_if_absent: 0.5, 0.95, 0.99
#        cache.put: 0.5, 0.95, 0.99